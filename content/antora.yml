name: modules
title: "Building Pipelines using Tekton on OpenShift"
version: master
nav:
  - modules/ROOT/nav.adoc

asciidoc:
  attributes:
    lab_name: "building-pipelines-tekton-openshift"
    release-version: master
    page-pagination: true
    # OpenShift Cluster Access
    OPENSHIFT_CONSOLE_URL: "%OPENSHIFT_CONSOLE_URL%"
    OPENSHIFT_API_URL: "%OPENSHIFT_API_URL%"
    OPENSHIFT_USERNAME: "%OPENSHIFT_USERNAME%"
    OPENSHIFT_PASSWORD: "%OPENSHIFT_PASSWORD%"
    # Environment
    guid: "%guid%"
    page-links:
    - url: https://redhat.com
      text: Red Hat

antora:
  extensions:
    - require: ./lib/dev-mode.js
      enabled: false
    - require: ./lib/preserve-url-params-extension.js